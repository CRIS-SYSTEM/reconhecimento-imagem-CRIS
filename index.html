<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIS-SYSTEM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #FFD700, #FFC107);
            font-family: Arial, sans-serif;
        }

        .box {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            font-weight: bold;
        }

        .btn-camera {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-camera:hover {
            transform: scale(1.05);
        }

        #webcam-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        canvas {
            border-radius: 10px;
            border: 3px solid #000;
        }

        .progress {
            height: 25px;
            margin-bottom: 10px;
        }

        .label {
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="box text-center">
        <h1>📸 SITE CRIS-SYSTEM</h1>

        <button class="btn btn-dark btn-camera" onclick="init()">
            🎥 Permitir acesso à câmera
        </button>

        <div id="webcam-container"></div>

        <div id="label-container" class="mt-4"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/e-DZDricw/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");

            div.innerHTML = `
                <div class="label">Classe</div>
                <div class="progress">
                    <div class="progress-bar bg-dark" style="width: 0%">0%</div>
                </div>
            `;

            labelContainer.appendChild(div);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = (prediction[i].probability * 100).toFixed(0);
            const className = prediction[i].className;

            const item = labelContainer.childNodes[i];
            const label = item.querySelector(".label");
            const bar = item.querySelector(".progress-bar");

            label.innerHTML = className + " (" + prob + "%)";
            bar.style.width = prob + "%";
            bar.innerHTML = prob + "%";
        }
    }
</script>

</body>
</html>
